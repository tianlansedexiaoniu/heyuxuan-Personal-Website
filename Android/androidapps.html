<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>安卓自带的应用程序</title>
<link rel="icon" href="../img/hyx.ico" type="image/x-icon">
<link rel="stylesheet" href="../css/back.css">
</head>
<body>
<a href="../hyxtoolboxphone.html">
<button class="b">ᐸ</button>
</a>
<div style="border:none;text-align:center">
<font size="8" color="#46A3FF">Android自带的应用程序</font>
</div>
<table align="right">
<tr>
<td>系统设置</td>
<td>
<a href="" onclick="f=createElement('iframe');f.src='intent://settings/#Intent;action=android.settings.SETTINGS;component=com.android.settings/.Settings;end;';body.appendChild(f);setTimeout(f.remove,200)"><button style="border:none;height:32px;width:32px;background:url(../icon/16.png)"></button>
</a>
</td>
</tr>
<tr>
<td>日历</td>
<td>
<a href="" onclick="event.preventDefault();f=document.createElement('iframe');f.style.display='none';f.src='intent://#Intent;action=android.intent.action.MAIN;component=com.android.calendar/.CalendarActivity;end';document.body.appendChild(f);setTimeout(f.remove,200)">
<button style="border:none;height:32px;width:32px;background:url(../icon/16.png)"></button>
</a>
</td>
</tr>
<tr>
<td>系统短信</td>
<td>
<a href="sms:">
<button style="border:none;height:32px;width:32px;background:url(../icon/43.png)"></button>
</a>
</td>
</tr>
<tr>
<td>系统地图</td>
<td>
<a href="mailto:">
<a href="geo:">
<button style="border:none;height:32px;width:32px;background:url(../icon/43.png)"></button>
</a>
</td>
</tr>
</table>
<table>
<tr>
<td>系统相机</td>
<td>
<a href="" onclick="event.preventDefault();f=document.createElement('iframe');f.style.display='none';f.src='intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;component=com.android.camera2/com.android.camera.CameraActivity;end';document.body.appendChild(f);setTimeout(()=>f.remove(),300)">
<button style="border:none;height:32px;width:32px;background:url(../icon/29.png)"></button>
</a>
</td>
</tr>
<tr>
<td>工程师模式</td>
<td>
<a href="" onclick="event.preventDefault();f=document.createElement('iframe');f.style.display='none';f.src='intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;component=com.sprd.engineermode/.EngineerModeActivity;end';document.body.appendChild(f);setTimeout(f.remove,200)">
<button style="border:none;height:32px;width:32px;background:url(../icon/43.png)"></button>
</a>
</td>
</tr>
<tr>
<td>系统电话</td>
<td>
<a href="tel:">
<button style="border:none;height:32px;width:32px;background:url(../icon/43.png)"></button>
</a>
</td>
</tr>
<tr>
<td>系统邮箱</td>
<td>
<a href="mailto:">
<button style="border:none;height:32px;width:32px;background:url(../icon/43.png)"></button>
</a>
</td>
</tr>
</table>
</body>
</html>
