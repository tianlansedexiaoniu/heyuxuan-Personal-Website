<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>检查修复硬盘</title>
<link rel="icon" href="../img/hyx.ico" type="image/x-icon">
<style>progress{width:100%;height:36px;border:none;background:#f0f0f0}progress::-webkit-progress-value{background:#00e650;transition:width .5s linear}</style>
<script>let 禁重复=!1,动画=null;function check(){if(禁重复)return;禁重复=!0,alert("网页版不支持此功能");const e=document.getElementById("进度");e.value=0,clearInterval(动画);let t=0;动画=setInterval(()=>{t+=2,t>=100&&(t=100,clearInterval(动画)),e.value=t},10)}</script>
</head>
<body>
<table align="right">
<tr>
<td><a href="../hyxtoolbox.html"><button style="border:none;height:32px;width:32px;background:url(../img/close.png)"></button></a></td>
</tr>
</table>
<table width="100%">
<tr>
<td><img src="../icon/52.png" style="height:32px" onclick='alert("说明:\n1.此功能可在磁盘无法访问或文件损坏时使用\n2.使用此功能必须获得管理员权限(警告：如在文件损坏时使用此功能修复磁盘可能导致文件丢失。)")'></td>
<td width="100%" align="center"><span style="display:inline-flex;align-items:center;"><font size="7">检查修复硬盘</font><img src="../icon/12.png" style="height:48px;width:48px;margin-left:12px"></span></td>
</tr>
</table>
<br>
<table width="100%">
<tr>
<td><progress id="进度" value="0" max="100"></progress></td>
</tr>
</table>
<br><br>
<table width="100%">
<tr>
<tr>
<td><select style="width:100%;font-size:20px"><option value="unknown">网页版不支持读取硬盘</option></select></td>
</tr>
</td>
</tr>
</table>
<br><br>
<table width="100%">
<tr>
<td><button onclick="check()" style="width:100%;height:80px;font-size:50px;line-height:80px;padding:0;border:none;">开始检查修复</button>
</td>
</tr>
</table>
</body>
</html>
